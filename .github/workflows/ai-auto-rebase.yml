name: Auto-rebase AI branches

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Wait for GitHub merge status computation
        if: github.event_name == 'push'
        run: sleep 60

      - name: Rebase conflicting AI PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find open PRs on ai/* branches that are conflicting
          prs=$(gh pr list --state open --json number,headRefName,mergeable \
            --jq '.[] | select(.headRefName | startswith("ai/")) | select(.mergeable == "CONFLICTING") | "\(.number) \(.headRefName)"')

          if [ -z "$prs" ]; then
            echo "No conflicting AI PRs found"
            exit 0
          fi

          echo "$prs" | while read -r number branch; do
            echo "::group::Rebasing PR #$number ($branch)"

            # Skip PRs with auto-merge pending (force-push would cancel it)
            AUTO_MERGE=$(gh pr view "$number" --repo "${{ github.repository }}" --json autoMergeRequest --jq '.autoMergeRequest != null')
            if [ "$AUTO_MERGE" = "true" ]; then
              echo "⏭️ PR #$number has auto-merge pending — skipping rebase"
              echo "::endgroup::"
              continue
            fi

            git fetch origin "$branch"
            git checkout -B "$branch" "origin/$branch"

            if git rebase origin/main; then
              git push --force-with-lease origin "$branch"
              echo "✅ PR #$number rebased successfully"
            else
              git rebase --abort
              echo "⚠️ PR #$number has non-trivial conflicts — relabeling for AI to resolve"

              # Extract issue number from branch name (ai/issue-NNN-...)
              issue_num=$(echo "$branch" | sed -E 's|^ai/issue-([0-9]+).*|\1|')

              if [ -n "$issue_num" ] && [ "$issue_num" != "$branch" ]; then
                REBASE_ATTEMPTS=$(gh api "repos/${{ github.repository }}/issues/${issue_num}/comments" \
                  --paginate --jq '[.[] | select(.body | contains("<!-- ai-rebase-attempt -->"))] | length' 2>/dev/null || echo "0")

                if [ "$REBASE_ATTEMPTS" -ge 10 ]; then
                  echo "🛑 Circuit breaker: issue #$issue_num has $REBASE_ATTEMPTS rebase failures"
                  gh issue edit "$issue_num" \
                    --remove-label "ai-task,ai-in-progress,ai-review-ready,ai-debugging" \
                    --add-label "ai-blocked" 2>/dev/null || true

                  {
                    echo "<!-- circuit-breaker-tripped -->"
                    echo "## 🛑 Circuit Breaker Tripped — Human Intervention Required"
                    echo ""
                    echo "This issue has failed **$REBASE_ATTEMPTS rebase attempts** and has been blocked."
                    echo "A human must investigate the persistent merge conflicts and remove \`ai-blocked\` to resume."
                  } > /tmp/circuit-breaker.md
                  gh issue comment "$issue_num" --body-file /tmp/circuit-breaker.md
                  echo "::endgroup::"
                  continue
                fi

                # Keep the PR open — the AI will resolve conflicts on the existing branch
                # Just relabel the issue so the orchestrator picks it up
                gh issue edit "$issue_num" \
                  --remove-label "ai-in-progress" \
                  --remove-label "ai-review-ready" \
                  --add-label "ai-task,ai-debugging" 2>/dev/null || true

                # Get the conflict file list
                conflict_files=$(git rebase origin/main 2>&1 | grep "CONFLICT" | head -10 || echo "Could not determine conflicting files")
                git rebase --abort 2>/dev/null || true

                # Post context so the AI knows exactly what to fix
                {
                  echo "<!-- ai-rebase-attempt: $((REBASE_ATTEMPTS + 1))/10 -->"
                  echo "<!-- ai-rebase-attempt -->"
                  echo "## ⚠️ Merge Conflicts — Fix Needed (Attempt $((REBASE_ATTEMPTS + 1))/10)"
                  echo ""
                  echo "**Branch:** \`$branch\` (PR #$number still open — resolve conflicts on existing branch, don't start fresh)"
                  echo ""
                  echo "**Conflicts:**"
                  echo '```'
                  echo "$conflict_files"
                  echo '```'
                  echo ""
                  echo "**Action:** Relabeled to \`ai-task\`. Orchestrator will pick this up — check out the existing branch, run \`git rebase origin/main\`, resolve the conflicts, force-push. Do NOT create a new branch or PR."
                } > /tmp/rebase-comment-body.md
                gh issue comment "$issue_num" --body-file /tmp/rebase-comment-body.md

                gh pr comment "$number" --body "⚠️ Auto-rebase failed due to merge conflicts. Issue #$issue_num relabeled for the orchestrator to resolve conflicts on this branch."

                echo "Relabeled issue #$issue_num for AI conflict resolution"
              fi
            fi

            echo "::endgroup::"
          done
