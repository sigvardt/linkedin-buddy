<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none" role="img" aria-labelledby="title desc">
<title>Install and build the repo in one sweep</title>
<desc>The source install fits in a handful of commands and leaves the CLI and MCP server ready for local use.</desc>
<defs>
<filter id="card-shadow" x="-20%" y="-20%" width="140%" height="160%">
<feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity=".12"/>
</filter>
<pattern id="bg-grid" width="48" height="48" patternUnits="userSpaceOnUse">
<path d="M48 0H0V48" fill="none" stroke="#E8EEF5" stroke-width="1"/>
</pattern>
<marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
<path d="M0 0L12 6L0 12Z" fill="#0F172A"/>
</marker>
</defs>
<rect width="1280" height="720" fill="#FFF7ED"/>
<rect width="1280" height="720" fill="url(#bg-grid)" opacity=".45"/>
<circle cx="1080" cy="124" r="176" fill="#14B8A6" opacity=".12"/>
<circle cx="170" cy="604" r="156" fill="#FF7A59" opacity=".1"/>
<circle cx="936" cy="612" r="114" fill="#38BDF8" opacity=".08"/>
<path d="M112 188C184 154 248 150 334 176" fill="none" stroke="#14B8A6" stroke-linecap="round" stroke-width="8"/>
<circle cx="334" cy="176" r="10" fill="#14B8A6"/>
<g>
<rect x="72" y="56" width="193" height="32" rx="16" fill="#0F172A" stroke="none" stroke-width="1.5"/>
<text x="168.5" y="77.1" fill="#FFF7ED" font-family="'Plus Jakarta Sans', 'Avenir Next', 'Segoe UI', sans-serif" font-size="15" font-weight="700" text-anchor="middle">TERMINAL SNAPSHOT</text>
</g>
<text x="72" y="138" fill="#0F172A" font-family="'Sora', 'Avenir Next', 'Trebuchet MS', 'Segoe UI', sans-serif" font-size="48" font-weight="700" letter-spacing="-.8">Install and build the repo in one sweep</text>
<text x="72" y="178" fill="#334155" font-family="'Plus Jakarta Sans', 'Avenir Next', 'Segoe UI', sans-serif" font-size="22" font-weight="500">The source install fits in a handful of commands and leaves the CLI</text>
<text x="72" y="212" fill="#334155" font-family="'Plus Jakarta Sans', 'Avenir Next', 'Segoe UI', sans-serif" font-size="22" font-weight="500">and MCP server ready for local use.</text>
<g filter="url(#card-shadow)">
<rect x="92" y="244" width="1096" height="342" rx="30" fill="#111827" stroke="#0B1220" stroke-width="2"/>
<circle cx="126" cy="278" r="8" fill="#FF7A59"/>
<circle cx="154" cy="278" r="8" fill="#F59E0B"/>
<circle cx="182" cy="278" r="8" fill="#14B8A6"/>
<text x="1160" y="284" fill="#E5E7EB" font-family="'Plus Jakarta Sans', 'Avenir Next', 'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="end">Source install</text>
<text x="126" y="340" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#14B8A6">$</tspan><tspan dx="8" fill="#FFFFFF"> git clone https://github.com/sigvardt/linkedin-buddy.git</tspan></text>
<text x="126" y="374" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#14B8A6">$</tspan><tspan dx="8" fill="#FFFFFF"> cd linkedin-buddy</tspan></text>
<text x="126" y="408" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#14B8A6">$</tspan><tspan dx="8" fill="#FFFFFF"> npm install</tspan></text>
<text x="126" y="442" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#14B8A6">$</tspan><tspan dx="8" fill="#FFFFFF"> npx playwright install chromium</tspan></text>
<text x="126" y="476" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#14B8A6">$</tspan><tspan dx="8" fill="#FFFFFF"> npm run build</tspan></text>
<text x="126" y="510" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#34D399">✓</tspan><tspan dx="8" fill="#E5E7EB"> workspace ready for CLI and MCP</tspan></text>
</g>
<g>
