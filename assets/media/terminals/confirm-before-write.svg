<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none" role="img" aria-labelledby="title desc">
<title>See the preview, then confirm with a token</title>
<desc>The CLI returns exactly what will happen and records the action locally before anything touches LinkedIn.</desc>
