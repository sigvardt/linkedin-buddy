<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none" role="img" aria-labelledby="title desc">
<title>Search people, companies, jobs, posts, groups, and events</title>
<desc>One command surface spans LinkedIn discovery workflows, with consistent flags and structured results for humans and agents.</desc>
