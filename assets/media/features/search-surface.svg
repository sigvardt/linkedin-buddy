<text x="104" y="402" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#E5E7EB">2. Morgan Lee — DevRel Lead @ Graphite</tspan></text>
<text x="104" y="436" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#E5E7EB">3. Sam Chen — Staff Developer Advocate @ Northwind</tspan></text>
<text x="104" y="470" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#E5E7EB">4. Priya Patel — Developer Marketing @ MetricFlow</tspan></text>
<text x="104" y="504" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#E5E7EB">5. Jess Kim — Community Programs @ Kernel</tspan></text>
<text x="104" y="538" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#14B8A6">$</tspan><tspan dx="8" fill="#FFFFFF"> linkedin jobs search &quot;product manager&quot; --location Copenhagen --limit 3</tspan></text>
<text x="104" y="572" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#E5E7EB">1. Senior Product Manager — Northwind • Copenhagen</tspan></text>
<text x="104" y="606" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#E5E7EB">2. Platform PM — Signal Harbor • Remote</tspan></text>
<text x="104" y="640" xml:space="preserve" fill="#E5E7EB" font-family="'JetBrains Mono', 'SFMono-Regular', Menlo, Consolas, monospace" font-size="21" font-weight="500" font-variant-ligatures="none"><tspan fill="#E5E7EB">3. Product Growth Lead — Blue Atlas • Hybrid</tspan></text>
