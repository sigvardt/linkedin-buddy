<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LinkedIn Buddy demo placeholder</title>
  <desc id="desc">A stylized placeholder showing the CLI, MCP server, and core runtime.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fb" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" rx="32" />

  <g transform="translate(80 72)">
    <rect x="0" y="0" width="1040" height="576" rx="28" fill="#ffffff" opacity="0.96" />
    <rect x="0" y="0" width="1040" height="72" rx="28" fill="#0a66c2" />
    <rect x="0" y="44" width="1040" height="28" fill="#0a66c2" />

    <circle cx="42" cy="36" r="8" fill="#bfdbfe" />
    <circle cx="68" cy="36" r="8" fill="#93c5fd" />
    <circle cx="94" cy="36" r="8" fill="#60a5fa" />

    <text x="132" y="44" font-size="28" font-family="ui-sans-serif, system-ui, sans-serif" fill="#ffffff">
      LinkedIn Buddy quick-start
    </text>

    <g transform="translate(48 116)">
      <rect x="0" y="0" width="566" height="382" rx="24" fill="url(#panel)" />
      <text x="28" y="42" font-size="26" font-family="ui-monospace, monospace" fill="#93c5fd">
        $ npm exec -w @linkedin-buddy/cli -- linkedin status
      </text>
      <text x="28" y="96" font-size="22" font-family="ui-monospace, monospace" fill="#e2e8f0">
        authenticated: true
      </text>
      <text x="28" y="132" font-size="22" font-family="ui-monospace, monospace" fill="#e2e8f0">
        profile_name: default
      </text>
      <text x="28" y="168" font-size="22" font-family="ui-monospace, monospace" fill="#e2e8f0">
        evasion.level: moderate
      </text>
      <text x="28" y="222" font-size="22" font-family="ui-monospace, monospace" fill="#93c5fd">
        $ npm exec -w @linkedin-buddy/cli -- linkedin search
      </text>
      <text x="28" y="258" font-size="22" font-family="ui-monospace, monospace" fill="#93c5fd">
        "developer relations" --category people --limit 5
      </text>
      <text x="28" y="312" font-size="22" font-family="ui-monospace, monospace" fill="#e2e8f0">
        1. Jane Doe  Senior Developer Advocate
      </text>
      <text x="28" y="348" font-size="22" font-family="ui-monospace, monospace" fill="#e2e8f0">
        2. Alex Smith  DevRel Lead
      </text>
    </g>

    <g transform="translate(654 116)">
      <rect x="0" y="0" width="338" height="168" rx="24" fill="#eff6ff" stroke="#93c5fd" stroke-width="2" />
      <text x="28" y="46" font-size="30" font-family="ui-sans-serif, system-ui, sans-serif" fill="#0f172a">
        linkedin-mcp
      </text>
      <text x="28" y="88" font-size="20" font-family="ui-sans-serif, system-ui, sans-serif" fill="#334155">
        MCP tools for search, inbox,
      </text>
      <text x="28" y="118" font-size="20" font-family="ui-sans-serif, system-ui, sans-serif" fill="#334155">
        feed, jobs, notifications,
      </text>
      <text x="28" y="148" font-size="20" font-family="ui-sans-serif, system-ui, sans-serif" fill="#334155">
        and confirmed write actions
      </text>
    </g>

    <g transform="translate(654 312)">
      <rect x="0" y="0" width="338" height="186" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
      <text x="28" y="46" font-size="30" font-family="ui-sans-serif, system-ui, sans-serif" fill="#0f172a">
        @linkedin-buddy/core
      </text>
      <text x="28" y="88" font-size="20" font-family="ui-sans-serif, system-ui, sans-serif" fill="#334155">
        Shared runtime with
      </text>
      <text x="28" y="118" font-size="20" font-family="ui-sans-serif, system-ui, sans-serif" fill="#334155">
        Playwright profiles,
      </text>
      <text x="28" y="148" font-size="20" font-family="ui-sans-serif, system-ui, sans-serif" fill="#334155">
        SQLite state, artifacts,
      </text>
      <text x="28" y="178" font-size="20" font-family="ui-sans-serif, system-ui, sans-serif" fill="#334155">
        and two-phase writes
      </text>
    </g>
  </g>
</svg>
