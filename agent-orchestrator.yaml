dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3000
defaults:
  runtime: tmux
  agent: codex
  workspace: worktree
  notifiers:
    - desktop
    - webhook
projects:
  linkedin-owa-agentools:
    name: linkedin-owa-agentools
    sessionPrefix: loa
    repo: sigvardt/linkedin-buddy
    path: /Users/user/Repositories/linkedin-owa-agentools
    defaultBranch: main
    agentConfig:
      permissions: permissionless
    agentRules: |
      CRITICAL: Do NOT rename or create new git branches. Use the branch you were given in your worktree as-is. Push all commits to this branch.

      Always run tests before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).
      Link issue numbers in commit messages.
      Write clear commit messages that explain WHY, not just WHAT.
      Include "Closes #N" (with the issue number) in both the PR description AND the final commit message so GitHub auto-closes the issue on merge.

      Use TypeScript strict mode.
      Use ESM modules with .js extensions in imports (e.g., import { foo } from "./bar.js").
      Use node: prefix for built-in modules (e.g., import { readFile } from "node:fs").
      Prefer const over let, never use var.
      Use type imports for type-only imports: import type { Foo } from "./bar.js".
      No any types - use unknown with type guards instead.

      Before pushing, run these commands:
      - npm run typecheck
      - npm run lint
      - npm test
reactions:
  ci-failed:
    auto: true
    action: send-to-agent
    retries: 2
    escalateAfter: 2
  changes-requested:
    auto: true
    action: send-to-agent
    escalateAfter: 30m
  approved-and-green:
    auto: true
    action: auto-merge
    priority: action
  agent-stuck:
    threshold: 10m
    action: notify
    priority: urgent
notifiers:
  webhook:
    plugin: webhook
    url: http://127.0.0.1:14900/ao-events
    method: POST
notificationRouting:
  urgent:
    - desktop
    - webhook
  action:
    - desktop
    - webhook
  warning:
    - webhook
  info:
    - webhook
